
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flix Cinema | Movies Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff0000;
            --accent-blue: #0071eb;
            --bg-black: #050505;
            --card-bg: #121212;
            --nav-bg: rgba(0, 0, 0, 0.9);
            --text-main: #ffffff;
            --text-dim: #a3a3a3;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding-top: 140px; 
            padding-bottom: 80px;
        }

        /* --- Full Width Header --- */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            z-index: 5000;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 15px 5%;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-red);
            text-decoration: none;
            letter-spacing: -1.5px;
            flex-shrink: 0;
        }

        .nav-container {
            display: flex;
            gap: 8px;
            flex-grow: 1;
            justify-content: center;
        }

        .nav-btn {
            padding: 8px 15px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap;
        }

        .nav-btn.active {
            background: var(--primary-red);
            border-color: var(--primary-red);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .search-wrapper {
            flex-grow: 1;
            max-width: 250px;
        }

        #search-box {
            width: 100%;
            padding: 10px 18px;
            border-radius: 20px;
            border: 1px solid #333;
            background: #111;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        /* --- Auth Overlay --- */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 10001;
        }

        .login-box {
            background: #111;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid #222;
            width: 90%; max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .login-box h2 { color: var(--primary-red); font-size: 2rem; margin-bottom: 10px; }
        .pin-note { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; line-height: 1.5; }

        .login-box input {
            width: 100%; padding: 15px; font-size: 1.5rem; letter-spacing: 5px;
            background: #000; border: 2px solid #333; color: #fff;
            border-radius: 15px; margin-bottom: 20px; text-align: center;
        }

        .login-box button {
            width: 100%; padding: 15px; background: var(--primary-red);
            color: #fff; border: none; border-radius: 15px; font-weight: bold; cursor: pointer;
            font-size: 1rem;
        }

        /* --- Movie Grid --- */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            position: relative;
        }

        .movie-card:hover { transform: translateY(-8px); border-color: #333; }

        .movie-card img {
            width: 100%; height: 260px; object-fit: cover;
        }

        .movie-info { padding: 12px; }
        .movie-name {
            font-size: 0.85rem; font-weight: 600; height: 38px;
            overflow: hidden; margin-bottom: 12px; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }

        .btn-stack { display: flex; flex-direction: column; gap: 8px; }
        .btn {
            padding: 10px; border-radius: 8px; font-weight: 700; font-size: 0.7rem;
            cursor: pointer; text-transform: uppercase; border: none;
        }
        .watch-btn { background: var(--accent-blue); color: #fff; }
        .copy-btn { background: #222; color: #aaa; }

        /* --- Responsive Design --- */
        @media (max-width: 850px) {
            header { padding: 10px 15px; }
            body { padding-top: 150px; }
            .header-top { flex-wrap: wrap; justify-content: center; }
            .logo { order: 1; }
            .search-wrapper { order: 3; max-width: 100%; width: 100%; margin-top: 5px; }
            .nav-container { order: 2; }
        }

        @media (max-width: 480px) {
            .movie-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .movie-card img { height: 210px; }
            .nav-btn { padding: 6px 10px; font-size: 0.7rem; }
        }

        .disclaimer { text-align: center; padding: 25px; color: #444; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-box">
            <h2>FLIX CINEMA</h2>
            <p class="pin-note">Movies Library Unlock</p>
            <input type="password" id="pin-field" maxlength="4" placeholder="••••" onkeydown="if(event.key==='Enter') verify()">
            <p class="pin-note"><strong>Note:</strong> PIN is available in the WhatsApp Group Bio.</p>
            <button onclick="verify()">UNLOCK MOVIES</button>
            <p id="err" style="color:red; margin-top:10px; font-size: 0.8rem;"></p>
        </div>
    </div>

    <div id="content" style="display:none;">
        <header>
            <div class="header-top">
                <a href="#" class="logo">FLIX CINEMA</a>
                
                <div class="nav-container">
                    <a href="index.html" class="nav-btn">HOME</a>
                    <a href="movies.html" class="nav-btn active">MOVIES</a>
                    <a href="series.html" class="nav-btn">SERIES</a>
                </div>

                <div class="search-wrapper">
                    <input type="text" id="search-box" placeholder="Search Movies..." onkeyup="doSearch()">
                </div>
            </div>
        </header>

        <div class="movie-grid" id="movie-grid"></div>
        <div id="loading-msg" style="text-align:center; padding: 50px; color: #444;">Fetching Movies...</div>
        
        <div class="disclaimer">
            &copy; 2026 Flix Cinema Premium. Movies collection.<br>
            PC Users: Downloads as M3U for VLC. Mobile: Streams via Player.
        </div>
    </div>

    <script>
        const ver = "?v=" + new Date().getTime();
        const M3U_URL = 'https://maxmentor.github.io/flixcinema/movies.m3u' + ver;
        const PIN_URL = 'https://maxmentor.github.io/flixcinema/pin.txt' + ver;
        let movies = [], filtered = [], index = 0, correctPin = "";

        // PC Detection
        const isPC = !/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        fetch(PIN_URL, { cache: "no-store" }).then(r => r.text()).then(t => { correctPin = t.trim(); checkSession(); });

        function checkSession() {
            if (localStorage.getItem('flix_auth_time') && (new Date().getTime() - parseInt(localStorage.getItem('flix_auth_time')) < 86400000)) showContent();
        }

        function verify() {
            if (document.getElementById('pin-field').value === correctPin) {
                localStorage.setItem('flix_auth_time', new Date().getTime().toString());
                showContent();
            } else { document.getElementById('err').innerText = "❌ Invalid PIN"; }
        }

        function showContent() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            init();
        }

        async function init() {
            try {
                const res = await fetch(M3U_URL);
                const data = await res.text();
                parseM3U(data);
                filtered = [...movies];
                document.getElementById('loading-msg').style.display = 'none';
                render();
            } catch (e) { document.getElementById('loading-msg').innerText = "Connection failed."; }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let temp = {};
            lines.forEach(l => {
                l = l.trim();
                if (l.startsWith('#EXTINF')) {
                    const name = l.split(',').pop();
                    const logo = l.match(/tvg-logo="(.*?)"/);
                    temp = { name: name, poster: (logo && logo[1]) ? logo[1] : 'https://via.placeholder.com/300x450?text=Movie' };
                } else if (l.startsWith('http')) {
                    temp.url = l;
                    movies.push({...temp});
                }
            });
        }

        function render() {
            const grid = document.getElementById('movie-grid');
            const batch = filtered.slice(index, index + 20);
            batch.forEach(m => {
                const actionLabel = isPC ? "⬇ DOWNLOAD M3U" : "▶ WATCH NOW";
                grid.innerHTML += `
                    <div class="movie-card">
                        <img src="${m.poster}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=Flix+Cinema'">
                        <div class="movie-info">
                            <div class="movie-name">${m.name}</div>
                            <div class="btn-stack">
                                <button class="btn watch-btn" onclick="handleAction('${m.url}', '${m.name.replace(/'/g, "")}')">${actionLabel}</button>
                                <button class="btn copy-btn" onclick="copy('${m.url}', this)">🔗 Copy Link</button>
                            </div>
                        </div>
                    </div>`;
            });
            index += 20;
        }

        function handleAction(url, name) { 
            if(isPC) {
                const m3uContent = `#EXTM3U\n#EXTINF:-1, ${name}\n${url}`;
                const blob = new Blob([m3uContent], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${name.trim()}.m3u`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } else {
                window.location.href = `intent:${url}#Intent;type=video/*;end`; 
            }
        }

        function copy(url, btn) { 
            navigator.clipboard.writeText(url); 
            btn.innerText = "✅ COPIED"; 
            setTimeout(() => btn.innerText = "🔗 COPY LINK", 1000); 
        }
        
        function doSearch() {
            const q = document.getElementById('search-box').value.toLowerCase();
            document.getElementById('movie-grid').innerHTML = ''; index = 0;
            filtered = movies.filter(m => m.name.toLowerCase().includes(q));
            render();
        }

        window.onscroll = () => { if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) { if (index < filtered.length) render(); } };
    </script>
</body>
</html>
